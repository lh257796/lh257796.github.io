<!DOCTYPE html>
<html>
<head>
    <link href=“style.css” rel=“stylesheet”>
    <title>Do people even READ titles anymore? Like seriously, it's as though people ignore this brilliant little section of an HTML file and it's just preposterous how under-utilized this element is... .... ...is anyone still here?</title>
</head>


<body>
<p>
    <h1><em>Han's Website</em></h1> <br>using Github Pages.</p>

<p type="Center">Github Pages will reference the following sources: index.html > index.md > README.md</p>

<p><a href="html-hello-world.html">Cheatsheet for HTML</a></p>
<p><a href="fakeform.html">-forms-</a></p>


<button onClick="newFunction()">Look I'm a button! Who what I do???</button>
<br>

<p id="demo"></p>
<br>


<button onClick="secondFunction()">Important Survey Question</button>


<p id="test"></p>
<br>


<button onClick="thirdFunction()">Another Survey</button>



<p></p>
<p></p>

<p id="crest"></p>

<script>
    function newFunction() {
        let person=prompt("what's your name?", "John Doe");
        if (person!==null) {
            document.getElementById("demo").innerHTML=`Hello ${person}! Nice to meet you!`
        }
    }
    function secondFunction() {
        let person2=prompt("Do you enjoy buttons?", "Yes / No");
        if (person2==='Yes' || person2==='yes') {
            document.getElementById("test").innerHTML=`Glad to meet another fellow button lover!`

        } else {
            document.getElementById("test").innerHTML=`We have nothing left to talk about.`
        }
    }
    function thirdFunction() {
        let person2=prompt("Do you hate unsolicited questionnaires?", "Yes / No");
        if (person2==='Yes' || person2==='yes') {
            document.getElementById("crest").innerHTML=`So do I! We're incredibly alike!`

        } else {
            document.getElementById("crest").innerHTML=`Sorry to disappoint you but that was the last one.`
        }
    }
</script>
</body>
</html>
